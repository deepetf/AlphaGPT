# ============================================================================
# AlphaGPT 默认配置文件
# ============================================================================
# 用途:
# 1) 作为训练/评估的“基线配置”。
# 2) 自定义实验时，建议复制本文件后仅覆盖需要变更的参数。
#
# 使用:
#   python -m model_core.engine
#   python -m model_core.engine --config my_config.yaml
#
# 调参总原则:
# 1) 一次只改 1-3 个强相关参数，避免归因困难。
# 2) 先保证训练稳定，再追求更高上限。
# 3) 高风险参数(阈值、惩罚、熵控制)务必做 A/B 对照。
# ============================================================================

# ============================================================================
# 训练控制 (Top-Level)
# ============================================================================
# train_steps
# - 含义: 训练迭代步数(每步生成一个 batch 公式并更新一次参数)。
# - 用法: 控制训练总时长与搜索深度。
# - 建议:
#   - 调试: 100 ~ 500
#   - 快速验证: 1000 ~ 2000
#   - 深度搜索: 5000+

# batch_size
# - ??: ???? step ????????????????????????
# - ??: ??????????????????????
# - ??:
#   - ??: reward/?????????????? CPU/GPU/???
#   - ??: ???????????????????????
# - ??:
#   - CPU ??: 64 ~ 256
#   - ????: 256 ~ 1024
#   - ???????????? robust_config ?? reward_std_floor?
#     controller_*_floor_abs / controller_*_warn_rate??????? patience?
batch_size: 512
train_steps: 100

# lr
# - 含义: AdamW 学习率。
# - 用法: 控制策略网络每步更新幅度。
# - 建议:
#   - 稳定优先: 5e-5 ~ 1e-4
#   - 若出现“后期抖动/漂移”: 先降到 5e-5 再观察。
lr: 0.0001

# weight_decay
# - 含义: AdamW 权重衰减。
# - 用法: 轻度正则化，抑制过拟合。
# - 建议: 0.0 ~ 0.02；常用 0.01。
weight_decay: 0.01

# grad_clip_norm
# - 含义: 梯度裁剪阈值(L2 norm)。
# - 用法: 防止 REINFORCE 高方差导致梯度爆炸。
# - 建议:
#   - 常用: 0.5 ~ 1.5
#   - 若长期 100% 命中裁剪且学习变慢，可适当上调。
grad_clip_norm: 1.0

# grad_norm_log_interval
# - 含义: 梯度范数日志打印间隔(step)。
# - 用法: 监控是否爆炸/过度裁剪。
# - 建议: 20~50；调试时可设 10。
grad_norm_log_interval: 20

# warmup_days
# - 含义: 训练起始日前额外加载的“预热自然日”。
# - 用法: 给滚动特征/归一化留出历史窗口，避免起始阶段特征异常。
# - 建议:
#   - 使用 60 日滚动特征时建议 >= 85。
#   - 设 0 可关闭预热(不推荐，除非做严格对齐实验)。
warmup_days: 85

# ============================================================================
# 模型输入特征 (INPUT_FEATURES)
# ============================================================================
# 说明:
# 1) 这些名称必须与 BASIC_FACTORS 中可用因子一致。
# 2) 模型生成公式时仅能使用这里列出的基础因子。
# 3) 增加特征会扩大搜索空间，可能提升上限，但训练更慢且更易不稳定。
input_features:
  - CLOSE            # 转债收盘价
  - VOL              # 转债成交量
  - PREM             # 转股溢价率
  - DBLOW            # 双低指标
  - REMAIN_SIZE      # 剩余规模
  - PCT_CHG          # 转债日涨跌幅
  - PCT_CHG_5        # 转债5日涨跌幅
  - VOLATILITY_STK   # 正股波动率
  - PCT_CHG_STK      # 正股日涨跌幅
  - PCT_CHG_5_STK    # 正股5日涨跌幅
  - LOG_MONEYNESS    # log(S/K)
  - PURE_VALUE       # 纯债价值
  - ALPHA_PCT_CHG_5  # 转债/正股5日相对强弱
  - CAP_MV_RATE      # 转债市值占比
  - TURNOVER         # 换手率
  - IV               # 隐含波动率
  - VOL_STK_60       # 正股60日波动
  - PREM_Z           # 溢价率Z分数

# ============================================================================
# 稳健性配置 (RobustConfig)
# ============================================================================
robust_config:

  # --------------------------------------------------------------------------
  # 数据切分与稳定性
  # --------------------------------------------------------------------------
  # train_test_split_date
  # - 含义: 训练/验证切分日期(含时序 OOS 验证)。
  # - 用法: 该日期之前用于训练，之后用于验证。
  # - 建议: 使用业务上明确的 regime 切点；避免频繁改动。
  train_test_split_date: "2024-06-01"

  # rolling_window
  # - 含义: 计算滚动 Sharpe/稳定性指标的窗口长度(交易日)。
  # - 用法: 影响 stability_metric 的平滑程度。
  # - 建议: 40~80；窗口越大越稳，越小越灵敏。
  rolling_window: 60

  # stability_k
  # - 含义: 稳定性惩罚强度，公式常见形态: mean - k * std。
  # - 用法: 越大越偏好“平滑”策略。
  # - 建议:
#   - 稳健优先: 1.5~2.0
#   - 收益优先: 1.0~1.3
  stability_k: 1.5

  # --------------------------------------------------------------------------
  # 硬门槛 (Hard Thresholds)
  # --------------------------------------------------------------------------
  # min_sharpe_val
  # - 含义: 验证集最低 Sharpe 阈值。
  # - 用法: 低于阈值会触发 METRIC_SHARPE 失败。
  # - 建议: 0.05~0.2；阈值越高质量越高但通过率更低。
  min_sharpe_val: 0.1

  # min_active_ratio
  # - 含义: 每日有效持仓占 top_k 的最低比例。
  # - 用法: 太低表示策略信号稀疏，不具备稳定交易性。
  # - 建议: 0.2~0.5。
  min_active_ratio: 0.3

  # min_valid_days
  # - 含义: 训练/验证期最少有效交易日要求。
  # - 用法: 防止靠极少样本“偶然高分”。
  # - 建议: 15~40。
  min_valid_days: 20

  # min_valid_count
  # - 含义: 最小有效标的数量阈值(用于实盘/信号清洗路径)。
  # - 建议: >= 20，常用 30。
  min_valid_count: 30

  # top_k
  # - 含义: 每日选取标的数量。
  # - 影响: 越小越集中(波动大)，越大越分散(收益/风险都被稀释)。
  # - 建议: 5~15。
  top_k: 5

  # --------------------------------------------------------------------------
  # 交易与信号处理
  # --------------------------------------------------------------------------
  # fee_rate
  # - 含义: 单边交易费率。
  # - 用法: 直接进入回测收益扣减。
  # - 建议: 按交易环境真实费率设置，勿过度乐观。
  fee_rate: 0.001

  # take_profit
  # - 含义: 止盈阈值，0 表示关闭止盈。
  # - 示例: 0.06 表示 +6% 触发止盈规则。
  # - 建议: 0~0.08；需与 verify/sim 口径保持一致。
  take_profit: 0.06

  # signal_clean_enabled
  # - 含义: 是否启用信号清洗流程。
  # - 用法: 建议开启，提升鲁棒性。
  signal_clean_enabled: true

  # signal_winsor_q
  # - 含义: 截尾分位数(双侧)。
  # - 用法: 抑制极端值影响。
  # - 建议: 0.005~0.02。
  signal_winsor_q: 0.01

  # signal_clip
  # - 含义: 截尾后再做绝对值裁剪上限。
  # - 建议: 3~8；默认 5。
  signal_clip: 5.0

  # signal_rank_output
  # - 含义: 是否对信号做横截面排名输出。
  # - 建议: 通常 true，便于跨日可比。
  signal_rank_output: true

  # signal_min_valid_count
  # - 含义: 信号输出前要求的最小有效标的数。
  # - 建议: 与 min_valid_count 保持一致或略高。
  signal_min_valid_count: 30

  # sim_masked_cs_enabled
  # - 含义: 是否在 sim/live 选股中，对 CS_* 算子使用“统一可交易宇宙”掩码。
  # - 作用: 减少 live(短窗口) 与 strict_replay(长窗口) 因横截面宇宙差异导致的 TopK 分叉。
  # - 建议: true（推荐）；如需回滚旧行为可设为 false。
  sim_masked_cs_enabled: true

  # sim_cs_require_present
  # - 含义: CS/选股掩码是否额外要求“当日原始 SQL 有该 code 行”。
  # - 作用: 避免仅因前值填充而把“当日无原始记录”的标的纳入横截面。
  # - 建议: true（推荐）。
  sim_cs_require_present: true

  # sim_exec_price_raw_priority
  # - 含义: strict_replay 执行价口径是否“当日原值优先”。
  # - 作用: CLOSE/OPEN/HIGH 先取原始值；原始缺失再回退到填充值，减少执行价失真。
  # - 建议: true（推荐），便于与 SQL 原始日行情对齐。
  sim_exec_price_raw_priority: true

  # --------------------------------------------------------------------------
  # 评分权重
  # --------------------------------------------------------------------------
  # train_weight / val_weight
  # - 含义: 训练集/验证集 Sharpe 的加权系数。
  # - 用法: BaseScore = w_train * sharpe_train + w_val * sharpe_val
  # - 建议: val_weight >= train_weight 以抑制过拟合。
  train_weight: 0.4
  val_weight: 0.6

  # stability_w
  # - 含义: 稳定性奖励权重。
  # - 建议: 0.2~1.0。
  stability_w: 0.5

  # ret_w
  # - 含义: 年化收益奖励权重。
  # - 建议: 4~12；越大越偏收益导向。
  ret_w: 8.0

  # mdd_w
  # - 含义: 最大回撤惩罚权重。
  # - 建议: 8~20；越大越保守。
  mdd_w: 12.0

  # len_w
  # - 含义: 公式长度惩罚权重。
  # - 建议: 0.05~0.5；越大越偏简洁公式。
  len_w: 0.1

  # scale
  # - 含义: 总分缩放系数。
  # - 用法: 仅改变分数尺度，不改变相对排序。
  scale: 5.0

  # min_score_improvement
  # - 含义: 刷新 New King 需要超过当前 best 的最小提升量。
  # - 用法: 防止微小噪声反复刷 king。
  # - 建议: 0.001~0.02。
  min_score_improvement: 0.002

  # --------------------------------------------------------------------------
  # 惩罚参数
  # --------------------------------------------------------------------------
  # penalty_flip_coef
  # - 含义: train/val Sharpe 异号时的惩罚系数。
  # - 用法: 软惩罚而非直接淘汰，保留学习信号。
  penalty_flip_coef: 2.0

  # penalty_struct / penalty_exec / penalty_sharpe / penalty_active /
  # penalty_days / penalty_low_var
  # - 含义: 对应失败类型的基础惩罚值(越小越重)。
  # - 建议: 常设在 -2 到 -8；低方差通常应更重。
  penalty_struct: -5.0
  penalty_exec: -5.0
  penalty_sharpe: -5.0
  penalty_active: -4.0
  penalty_days: -2.5
  penalty_low_var: -5.5

  # S1: metric fail 连续地形
  # metric_fail_reward_mode
  # - hard: 旧版硬钳位惩罚(快速回滚用)
  # - soft: 使用连续 fail reward 地形(推荐)
  metric_fail_reward_mode: soft

  # metric_gap_w
  # - 含义: fail gap 惩罚强度，reward -= metric_gap_w * avg_gap
  # - 建议: 5~15；越大越强调“逼近阈值”。
  metric_gap_w: 8.0

  # metric_fail_reward_cap
  # - 含义: fail reward 上限，防止失败样本获得正激励。
  # - 建议: 通常设为 0.0。
  metric_fail_reward_cap: 0.0

  # metric_fail_reward_floor
  # - 含义: fail reward 下限，避免极端值主导梯度。
  # - 建议: -8~-15。
  metric_fail_reward_floor: -10.0

  # --------------------------------------------------------------------------
  # 熵控制与坍缩防护
  # --------------------------------------------------------------------------
  # entropy_beta_start / entropy_beta_end
  # - 含义: 熵系数线性衰减起止值。
  # - 用法: 前期探索，后期收敛。
  entropy_beta_start: 0.04
  entropy_beta_end: 0.015

  # reward_std_floor / reward_std_patience
  # - 含义: 奖励标准差下限与持续步数阈值。
  # - 用法: 检测 reward 饱和/坍缩征兆。
  reward_std_floor: 0.12
  reward_std_patience: 8

  # stagnation_patience
  # - 含义: 连续未出新 king 的容忍步数。
  # - 用法: 超过后触发额外探索(boost)。
  stagnation_patience: 12

  # stagnation_entropy_boost / collapse_entropy_boost
  # - 含义: 停滞/坍缩时附加熵增量。
  # - 建议: 0.01~0.05，过大可能导致噪声过强。
  stagnation_entropy_boost: 0.03
  collapse_entropy_boost: 0.02

  # entropy_controller_mode
  # - 含义: 熵控制主控信号来源。
  # - 可选:
  #   - hard: 基于 HardPass
  #   - metric: 基于 MetricPass
  #   - sim: 基于 SimPass
  #   - pool: 基于 pool 更新停滞(推荐)
  entropy_controller_mode: pool

  # entropy_lock_beta / entropy_lock_steps
  # - 含义: 触发 floor 后进入短期锁定探索状态。
  entropy_lock_beta: 0.06
  entropy_lock_steps: 10

  # entropy_warn_boost
  # - 含义: warning 状态下在 base_beta 基础上追加的增量。
  entropy_warn_boost: 0.01

  # controller_* 阈值
  # - 含义: 各模式的 floor/warn 判定线。
  # - 用法: floor 会触发 lock，warn 会轻度增熵。
  # - 建议: 先用默认，按日志中的 Roll[...] 和 KWait 再微调。
  controller_hard_floor_rate: 0.01
  controller_hard_floor_abs: 1.0
  controller_hard_warn_rate: 0.05

  controller_metric_floor_rate: 0.002
  controller_metric_floor_abs: 1.0
  controller_metric_warn_rate: 0.01

  controller_sim_floor_rate: 0.002
  controller_sim_floor_abs: 1.0
  controller_sim_warn_rate: 0.01

  controller_pool_floor_rate: 0.1
  controller_pool_floor_abs: 0.5
  controller_pool_warn_rate: 0.2
  controller_pool_stagnation_patience: 6

  # adv_noise_std
  # - 含义: 当奖励方差过低时给 advantage 添加噪声的标准差。
  # - 用法: 防止梯度完全塌缩为零。
  # - 建议: 0~0.1；默认 0.05。
  adv_noise_std: 0.05

  # --------------------------------------------------------------------------
  # 多样性池
  # --------------------------------------------------------------------------
  # diversity_pool_size
  # - 含义: 多样性池最大容量。
  # - 用法: 保存高分且差异化的候选，降低同质化。
  diversity_pool_size: 50

  # jaccard_threshold
  # - 含义: 公式相似度阈值(越小越严格)。
  # - 建议:
  #   - 创新优先: 0.6~0.75
  #   - 平衡: 0.8
  #   - 微调优先: 0.85~0.9
  jaccard_threshold: 0.8

  # --------------------------------------------------------------------------
  # 结构密度与解码约束
  # --------------------------------------------------------------------------
  # density_window / max_ts_in_window / density_penalty
  # - 含义: 限制时序算子局部堆叠密度及违规惩罚。
  # - 建议:
  #   - density_window: 4~8
  #   - max_ts_in_window: 3~5
  #   - density_penalty: -2 ~ -10
  density_window: 6
  max_ts_in_window: 4
  density_penalty: -2.0

  # decode_ts_density_soft_enabled
  # - 含义: 解码阶段是否对 TS 密度做“软惩罚”(非硬禁用)。
  decode_ts_density_soft_enabled: true

  # decode_ts_density_penalty_l1/l2/l3
  # - 含义: TS 密度超限时的分层惩罚强度。
  # - 建议: L1 < L2 < L3，形成递增梯度。
  decode_ts_density_penalty_l1: 0.3
  decode_ts_density_penalty_l2: 0.8
  decode_ts_density_penalty_l3: 1.5

  # decode_reachability_enabled
  # - 含义: 启用“可归约/可到达”约束，减少不合法 RPN 轨迹。
  decode_reachability_enabled: true

  # decode_lookahead_enabled
  # - 含义: 启用前瞻约束，提前避免未来必然死路的 token 选择。
  decode_lookahead_enabled: true

  # --------------------------------------------------------------------------
  # 语法硬约束
  # --------------------------------------------------------------------------
  # max_stack_depth
  # - 含义: RPN 计算栈最大深度。
  # - 用法: 阻止过深嵌套导致的复杂度爆炸与执行不稳定。
  # - 建议: 6~8；默认 7。
  max_stack_depth: 7

# ============================================================================
# AlphaGPT 默认配置文件 (V3.2)
# ============================================================================
# 本文件包含 AlphaGPT 引擎的可调参数配置。
# 使用方式:
#   python -m model_core.engine                          # 使用默认配置
#   python -m model_core.engine --config my_config.yaml  # 使用自定义配置
#
# 注意: 只需在自定义配置中覆盖需要修改的参数，其余参数将使用本文件中的默认值。
# ============================================================================

# ============================================================================
# 训练控制 (Training Control)
# ============================================================================
# train_steps:
#   定义: 训练总循环次数 (Update Steps)
#   用法: 控制训练时长。每步生成一个 Batch (默认512) 的公式。
#   建议: 
#     - 调试 (Debug): 100 ~ 500       (快速检查代码是否有 Bug)
#     - 快速验证 (Fast): 1000 ~ 2000  (初步查看因子收敛情况)
#     - 深度搜索 (Deep): 5000 ~ 10000+ (给模型足够时间探索复杂结构，寻找 "Super Alpha")
train_steps: 30
# ============================================================================
# 模型输入特征 (INPUT_FEATURES)
# ============================================================================
# 定义: AlphaGPT 模型可见的因子列表，这些因子将成为公式的"原子"
# 用法: 模型生成公式时，只能使用这些特征作为基础变量
# 引用位置: 
#   - model_core/config.py -> ModelConfig.INPUT_FEATURES
#   - model_core/alphagpt.py -> 构建词汇表时使用
#   - model_core/engine.py -> 打印训练配置时显示
# 可选值: 必须是 BASIC_FACTORS 中定义的因子名称
input_features:
  - CLOSE          # 收盘价
  - VOL            # 成交量
  - PREM           # 转股溢价率
  - DBLOW          # 双低值
  - REMAIN_SIZE    # 剩余规模
  - PCT_CHG        # 涨跌幅
  - PCT_CHG_5      # 五日涨跌幅
  - VOLATILITY_STK # 正股波动率
  - PCT_CHG_STK    # 正股涨跌幅
  - PCT_CHG_5_STK  # 正股五日涨跌幅
  - PURE_VALUE     # 纯债价值
  - ALPHA_PCT_CHG_5 # 五日涨跌幅差 (转债 - 正股)
  - CAP_MV_RATE    # 转债市值占比
  - TURNOVER       # 换手率
  - IV             # 隐含波动率
  - VOL_STK_60     # 正股60日波动率
  - PREM_Z         # 溢价率 Z-Score

# ============================================================================
# 稳健性配置 (RobustConfig)
# ============================================================================
# 这些参数控制公式评估的稳健性检验和奖励机制
robust_config:

  # --------------------------------------------------------------------------
  # 分段验证 (Split Validation)
  # --------------------------------------------------------------------------
  # 定义: 训练集/验证集的切分日期
  # 用法: 切分日期之前的数据用于训练，之后的数据用于验证 (Out-of-Sample Test)
  # 引用位置:
  #   - model_core/data_loader.py -> 计算 split_idx
  #   - model_core/engine.py -> 打印训练配置
  train_test_split_date: "2024-05-01"

  # --------------------------------------------------------------------------
  # 滚动稳定性 (Rolling Stability)
  # --------------------------------------------------------------------------
  # rolling_window:
  #   定义: 计算滚动 Sharpe 的窗口天数
  #   用法: stability_metric = rolling_sharpe.mean() - stability_k × rolling_sharpe.std()
  #   引用位置: model_core/backtest.py -> evaluate_robust()
  rolling_window: 60
  
  # stability_k:
  #   定义: 稳定性系数，越大对波动惩罚越重
  #   引用位置: model_core/backtest.py -> evaluate_robust()
  #   调节方向:
  #     - 调高 (如 2.0): **寻求绝对稳健**。只要 Sharpe 不稳定就重罚，可能会错过高收益但略有波动的因子。
  #     - 调低 (如 1.0): **容忍波动**。只要平均 Sharpe 高即可，不太在乎短期回撤。
  stability_k: 1.2

  # --------------------------------------------------------------------------
  # 硬淘汰阈值 (Hard Thresholds)
  # --------------------------------------------------------------------------
  # 只要不满足以下任一条件，公式直接被视为无效 (Score = -5.0)，不会进入排名。
  
  # min_sharpe_val:
  #   定义: 验证集最低 Sharpe Ratio。低于此值直接淘汰。
  #   引用位置: model_core/engine.py -> _worker_eval()
  min_sharpe_val: 0.2
  
  # min_active_ratio:
  #   定义: 最低持仓满足率 (实际持仓数 / top_k)。如果选不出股票，淘汰。
  #   引用位置: model_core/engine.py -> _worker_eval()
  min_active_ratio: 0.3
  
  # min_valid_days:
  #   定义: 训练/验证期间最少有效交易天数。如果大量时间空仓，淘汰。
  #   引用位置: model_core/engine.py -> _worker_eval()
  min_valid_days: 20
  
  # min_valid_count:
  #   定义: 实盘模式下最少有效标的数量 (熔断阈值)
  #   引用位置: model_core/config.py (预留)
  min_valid_count: 30
  
  # top_k:
  #   定义: 策略每日选股数量
  #   引用位置: model_core/engine.py -> CBBacktest
  top_k: 10
  
  # --------------------------------------------------------------------------
  # 交易费率 (Transaction Fee)
  # --------------------------------------------------------------------------
  # fee_rate:
  #   定义: 单边交易费率
  #   引用位置: model_core/backtest.py -> __init__
  fee_rate: 0.0005  # 单边千分之 0.5

  # --------------------------------------------------------------------------
  # 止盈配置 (Take Profit)
  # --------------------------------------------------------------------------
  # take_profit:
  #   定义: 止盈涨幅阈值（相对前收盘价）
  #   用法: 日内最高价达到该涨幅时自动止盈卖出
  #   取值:
  #     - 0 表示不止盈（默认，保持原逻辑）
  #     - 0.06 表示日内涨幅达6%时止盈卖出
  #   引用位置: model_core/backtest.py -> evaluate()
  take_profit: 0.0

  # --------------------------------------------------------------------------
  # 评分权重 (Scoring Weights)
  # --------------------------------------------------------------------------
  # 评分公式: Final Score = (Base Score + Stability Bonus) * Scale + Ret Bonus - Penalties
  # 引用位置: model_core/engine.py -> _worker_eval()
  
  # train_weight / val_weight:
  #   调节方向:
  #     - 增加 val_weight (如 0.8): **防止过拟合**。极度看重验证集表现 (OOS)。
  #     - 增加 train_weight (如 0.6): **更容易收敛**。允许在训练集表现好但验证集一般的因子存活。
  train_weight: 0.4
  val_weight: 0.6
  
  # stability_w: 稳定性加分权重。
  stability_w: 0.5
  
  # ret_w: 年化收益率加分权重。
  #   - 初始值为6.0，调高 (如 10.0): **收益优先**。哪怕回撤大一点，只要赚得多就给高分。
  ret_w: 8.0
  
  # mdd_w: 最大回撤惩罚权重。
  #   - 调高 (如 20.0): **风险厌恶**。稍微有一点大回撤就重罚，逼迫模型寻找 "稳如老狗" 的曲线。
  mdd_w: 10.0
  
  # len_w: 长度惩罚。
  #   - 调高 (如 0.5): **奥卡姆剃刀**。强迫模型生成极简公式 (3-5 个算子)。
  len_w: 0.1
  
  # scale: 分数缩放系数。控制数值范围，一般不用动。
  scale: 5.0

  # --------------------------------------------------------------------------
  # 惩罚参数 (Penalties)
  # --------------------------------------------------------------------------
  # 这里定义了各种违规情况的惩罚分值。
  # 负值越小，惩罚越重。

  # penalty_flip_coef:
  #   定义: 过拟合 (Flip) 的动态惩罚系数。Penalty = -1 * Coef * abs(Val_Sharpe)。
  #   - 作用: 将 Flip 从硬淘汰改为软惩罚，保留梯度信息。
  penalty_flip_coef: 2.0

  # Hard Filters (硬淘汰惩罚值): 
  # 当触发以下条件时，公式不仅被重罚，还会被标记为无效，不进入排行榜。
  # [V3.5] 惩罚阶梯 (Hierarchy of Failure)
  # 排序 (从重到轻): EXEC < STRUCT < LOWVAR < METRIC < SIM
  penalty_exec: -10.0      # 执行错误 (最底层)
  penalty_struct: -8.0     # 结构/语法无效
  penalty_lowvar: -6.5     # 死因子 (方差过低)
  
  # METRIC 线性梯度惩罚
  penalty_metric_max: -4.0 # 恰好不满足硬指标时的惩罚
  penalty_metric_min: -6.0 # 远低于阈值时的极限惩罚 (仍优于 LowVar)
  
  # 其他
  penalty_sim: -1.5        # 相似度拒绝 (轻惩罚)
  cache_max_size: 100000   # 缓存上限
  
  # --------------------------------------------------------------------------
  # 熵正则化 (Entropy Regularization) - 探索力度控制
  # --------------------------------------------------------------------------
  # 用于平衡 "探索(Exploration)" 与 "利用(Exploitation)"。
  # 引用位置: model_core/engine.py -> train() 循环内
  #
  # 调节方向:
  #   - 调高 start (如 0.04): **强探索模式**。
  #     - 目的: 打破局部最优，寻找全新结构的因子。
  #     - 代价: 初期会有大量无效公式，可能前 50 步都没有 King。
  #   - 调低 start (如 0.01): **快速收敛模式**。
  #     - 目的: 快速微调已知的高分模式，通过测试。
  #     - 代价: 容易陷入同质化，生成的因子长得都差不多。
  #
  # 建议配置 (针对长时间训练):
  #   - Entropy Start: 0.03 (保持高探索)
  #   - Entropy End: 0.01 (防止过早收敛)
  entropy_beta_start: 0.04
  entropy_beta_end: 0.015
  
  # --------------------------------------------------------------------------
  # 多样性池 (Diversity Pool) - 结果去重控制
  # --------------------------------------------------------------------------
  # 引用位置: model_core/engine.py -> 入池逻辑
  diversity_pool_size: 100
  
  
  # jaccard_threshold:
  #   定义: 策略相似度容忍阈值 (0.0 ~ 1.0)。
  #   原理: 比较两个公式使用的 "算子+变量" 集合的重叠程度。
  #
  #   调节方向:
  #   - 调低 (如 0.6): **极度严格 (追求创新)**。
  #     - 效果: 稍微有点像的公式都不让进 Top 50，逼迫模型必须另辟蹊径。
  #     - 场景: 想要找几个截然不同的思路时使用。
  #   - 调高 (如 0.9): **极度宽松 (允许变体)**。
  #     - 效果: 允许 "换汤不换药" 的微调版共存 (比如改了一个参数)。
  #     - 场景: 想要对某个好因子进行深度挖掘和微调时使用。
  #
  #   推荐值: 0.8 (平衡点)
  jaccard_threshold: 0.85
  
  # --------------------------------------------------------------------------
  # 局部密度检测 (Local Density Check) - 间接堆叠打击
  # --------------------------------------------------------------------------
  # 原理: 检测滑动窗口内的时序算子 (TS_*) 密度。
  # 目的: 禁止 `TS_MEAN(TS_MEAN(TS_MEAN(...)))` 这种无意义的深层平滑堆叠。
  # 引用位置: model_core/formula_validator.py
  
  density_window: 6
  
  # max_ts_in_window:
  #   调节方向:
  #   - 调低 (3): **严打堆叠**。几乎只能用简单的单层时序逻辑。
  #   - 调高 (4/5): **放宽限制**。允许复杂的嵌套逻辑 (如 Alpha 差分后再做平滑)。
  max_ts_in_window: 4
  
  # density_penalty:
  #   调节方向:
  #   - 调低 (-10.0): **杀无赦**。一旦违规直接淘汰。
  #   - 调高 (-2.0): **扣分警告**。如果收益特别高，勉强允许违规（因为 Total Score 可能会是正的）。
  density_penalty: -2.0

  # --------------------------------------------------------------------------
  # 语法约束配置 (Grammar Constraints)
  # --------------------------------------------------------------------------
  max_stack_depth: 7

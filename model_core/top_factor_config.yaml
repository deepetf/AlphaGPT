selection:
  top_k: 3
  candidate_sources:
    - best
    - history
    - diverse_top_50

  min_sharpe_all: 2.4
  min_sharpe_train: 2.1
  min_sharpe_val: 2.5
  min_balanced_sharpe: 2.1
  min_stability: -0.4
  max_drawdown: 0.20
  max_train_val_gap: 1.0

  # 相似度去重模式: formula / behavior / hybrid
  similarity_mode: hybrid
  # 公式 token Jaccard 阈值
  jaccard_threshold: 0.75
  # 平均持仓 Jaccard 阈值（仅 behavior / hybrid 生效）
  holding_jaccard_threshold: 0.80
  # 日收益相关性阈值（仅 behavior / hybrid 生效）
  return_corr_threshold: 0.90
  # true=使用 |corr|；false=使用 corr
  return_corr_abs: true
  # 计算行为相似度所需最少重叠交易日
  similarity_min_overlap_days: 20
  # behavior 模式行为签名不足时是否回退公式 Jaccard
  behavior_fallback_to_formula: true

  weights:
    sharpe_all: 0.30
    balanced_sharpe: 0.25
    stability: 0.20
    annualized_ret: 0.15
    max_drawdown: -0.10
    train_val_gap: -0.20

ai_review:
  enabled: false
  provider: gemini
  model: gemini-2.0-flash
  max_candidates: 10
  # glm5 兼容 OpenAI SDK，使用时可改为：
  # provider: glm5
  # model: ZhipuAI/GLM-5

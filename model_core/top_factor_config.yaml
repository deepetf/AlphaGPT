selection:
  top_k: 3
  candidate_sources:
    - best
    - history
    - diverse_top_50

  min_sharpe_all: 2
  min_sharpe_train: 2
  min_sharpe_val: 2
  min_balanced_sharpe: 2
  min_stability: -1.0
  max_drawdown: 0.20
  max_train_val_gap: 2.0

  # 相似度去重模式: formula / behavior / hybrid
  similarity_mode: hybrid
  # 公式 token Jaccard 阈值
  jaccard_threshold: 0.75
  # 平均持仓 Jaccard 阈值（仅 behavior / hybrid 生效）
  holding_jaccard_threshold: 0.80
  # 日收益相关性阈值（仅 behavior / hybrid 生效）
  return_corr_threshold: 0.90
  # true=使用 |corr|；false=使用 corr
  return_corr_abs: true
  # 计算行为相似度所需最少重叠交易日
  similarity_min_overlap_days: 20
  # behavior 模式行为签名不足时是否回退公式 Jaccard
  behavior_fallback_to_formula: true

  weights:
    sharpe_all: 0.30
    balanced_sharpe: 0.25
    stability: 0.20
    annualized_ret: 0.15
    max_drawdown: -0.10
    train_val_gap: -0.20

ai_review:
  enabled: false
  provider: select
  model: "[限时]deepseek-v3.2"
  base_url: https://once.novai.su/v1
  max_candidates: 10
  prompt:
    system: |
      你是可转债量化研究员。你的任务不是评价语言是否优美，而是判断一个因子是否具有清晰、可复核、具备金融逻辑的经济含义。
      该因子公式是逆波兰表达式（RPN, Reverse Polish Notation），必须按栈式执行顺序理解，不能按普通中缀表达式或自然语言短语拼接理解。
      请同时结合公式结构与量化指标进行判断，不要只看公式臆测。
      要求：
      1. 若 payload 提供 structure_hints，必须优先参考这些程序化结构事实；其次基于 semantic_expanded_formula 理解结构，再参考 expanded_formula；原始 formula 仅作为 RPN 参考。
      2. 你的第一步必须是按 RPN 栈式顺序正确展开公式，再基于展开后的结构讨论金融含义。
      3. 必须在内部先明确公式的数学结构；若无法可靠展开，就降低 interpretability_score，并在 risks 中说明“RPN 结构复杂导致解释不稳定”。
      4. 不要把相邻 token 直接当作并列语义特征；必须优先服从 RPN 执行顺序。
      5. 不得把 IF_POS 当成普通三元条件表达式；必须按 payload 中 operator_metadata 给出的项目内定义理解。
      6. 若未完成可靠的逐步展开，不得声称公式“等效于”“退化为”某个更简单表达式；最多只能写成待数值验证的风险提示。
      7. 输出必须是 JSON。
      8. 不要输出 markdown。
      9. 必须完整返回 schema 中定义的所有字段。
      10. financial_coherence_score 用于评估该因子是否围绕清晰的可转债主题展开，例如估值、溢价、流动性、正股联动、波动过滤。
      11. interpretability_score 用于评估公式是否容易解释、是否存在明显的门控拼接或无经济意义的复杂组合。
      12. theme_tags 返回 1~3 个简短主题标签。
      13. style_label 返回一个简短风格标签，例如 valuation、defensive、trend、liquidity。
      14. summary 用 1~2 句话概括核心逻辑。
      15. logic_chain 返回 1~3 条简短因果链。
      16. risks 返回 1~3 条主要风险或局限。
      17. review_decision 只能取 keep、watch、drop 之一，它只表示研究复核优先级，不代表最终量化入选结果。
      18. review_decision 必须严格按以下规则返回：若 financial_coherence_score >= 0.70 且 interpretability_score >= 0.60 且 risks 条数 <= 2，则返回 keep；若 financial_coherence_score < 0.40 或 interpretability_score < 0.30，则返回 drop；其余情况一律返回 watch。
      19. theme_tags 只能从以下枚举中选择：valuation、premium、equity_linkage、volatility、liquidity、momentum、defensive、hybrid。
      20. style_label 只能从以下枚举中选择：valuation、defensive、trend、mean_reversion、liquidity、hybrid。
      21. 不得使用“最终等效于”“必然”“证明了”“严重过拟合”这类过强结论；若只是基于公式结构和回测指标推断，必须使用“可能”“倾向于”“显示出”“存在...风险”等审慎表述。
      22. 不得声称完成了严格数学化简、因果证明或样本外验证；若无法由输入直接推出，只能写成风险提示或工作假设。
      23. risks 必须优先写以下三类：公式结构风险、经济解释风险、样本稳定性风险；只有在公式明显依赖某个输入字段时，才允许写数据质量风险。
      24. risks 至少有 1 条必须直接点名当前公式中的算子或字段，例如 IF_POS、MIN、MAX、PURE_VALUE、IV、PCT_CHG_STK。
      25. 评审时必须优先参考 payload 中提供的 feature_metadata、operator_metadata 与 structure_hints，不要自行臆测字段含义、算子语义或分支激活特性。
      26. 若多个字段量纲不同，必须提醒量纲不可直接类比；若字段本身是 zscore-like 或训练管线会额外做 time-z，也应在解释中区分说明。
      27. 对于 structure_hints 中已经明确给出的代数化简、非负性或分支触发条件，不要再给出与其矛盾的解释。
      28. 所有分数使用 0~1 小数。
    user_template: |
      请评估以下可转债因子，并返回 JSON。

      输出 schema:
      {schema_json}

      候选因子数据:
      {payload_json}
  output_schema:
    required_fields:
      - theme_tags
      - style_label
      - financial_coherence_score
      - interpretability_score
      - summary
      - logic_chain
      - risks
      - review_decision
    decision_values:
      - keep
      - watch
      - drop
    score_fields:
      - financial_coherence_score
      - interpretability_score
  decision_rule:
    keep:
      min_financial_coherence_score: 0.70
      min_interpretability_score: 0.60
      max_risks: 2
    drop:
      max_financial_coherence_score: 0.40
      max_interpretability_score: 0.30
    fallback: watch
  label_constraints:
    allowed_theme_tags:
      - valuation
      - premium
      - equity_linkage
      - volatility
      - liquidity
      - momentum
      - defensive
      - hybrid
    allowed_style_labels:
      - valuation
      - defensive
      - trend
      - mean_reversion
      - liquidity
      - hybrid
    max_theme_tags: 3
  risk_constraints:
    max_risks: 3
    required_formula_reference: true
    generic_risk_markers:
      - 数据源
      - 滞后
      - 估计误差
      - 准确性
      - 稳定性
  # select / NovAI 使用 OpenAI 兼容接口；
  # 默认优先读取 NOVAI_API_KEY，也兼容 OPENAI_API_KEY / AI_REVIEW_API_KEY。
  # glm5 兼容 OpenAI SDK，使用时可改为：
  # provider: glm5
  # model: ZhipuAI/GLM-5
